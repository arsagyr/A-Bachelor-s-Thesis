<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трендовый анализ - Economic Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 Трендовый анализ и прогнозирование</h1>
            <p>Визуализация исторических данных и прогнозов экспорта, импорта и ВВП</p>
        </div>
        <div class="content">
            <div class="controls">
                <div class="control-group">
                    <label>🌍 Выберите страну</label>
                    <select id="countrySelect"><option value="">-- Загрузка стран --</option></select>
                </div>
                <div class="control-group">
                    <label>🔮 Горизонт прогноза</label>
                    <select id="stepsSelect">
                        <option value="3">3 года</option>
                        <option value="5" selected>5 лет</option>
                        <option value="7">7 лет</option>
                        <option value="10">10 лет</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>📈 Модель</label>
                    <select id="regressionModel"><option value="linear">Линейная</option></select>
                </div>
                <div class="control-group">
                    <button onclick="loadForecast()" class="btn-primary">🔍 Построить прогноз</button>
                </div>
            </div>
            <div id="loadingMessage" class="loading" style="display:none;">⏳ Загрузка...</div>
            <div id="result" style="display:none;"></div>
        </div>
    </div>
    <script>
        let tradeChart = null, gdpChart = null;
        
        async function loadCountries() {
            try {
                const response = await fetch('/api/countries');
                const countries = await response.json();
                const select = document.getElementById('countrySelect');
                select.innerHTML = '<option value="">-- Выберите страну --</option>';
                countries.forEach(c => { const option = document.createElement('option'); option.value = c.id; option.textContent = c.name; select.appendChild(option); });
            } catch(e) { console.error(e); }
        }
        
        async function loadForecast() {
            const countryId = document.getElementById('countrySelect').value;
            if (!countryId) { alert('Выберите страну'); return; }
            const steps = document.getElementById('stepsSelect').value;
            const model = document.getElementById('regressionModel').value;
            document.getElementById('loadingMessage').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            try {
                const response = await fetch(`/api/trends/forecast/${countryId}?steps=${steps}&model=${model}`);
                const data = await response.json();
                if (data.success) displayForecast(data);
                else showError(data.error);
            } catch(e) { showError(e.message); }
            finally { document.getElementById('loadingMessage').style.display = 'none'; document.getElementById('result').style.display = 'block'; }
        }
        
        function showError(msg) { document.getElementById('result').innerHTML = `<div class="forecast-container"><div class="error-message">❌ ${msg}</div></div>`; }
        
        function displayForecast(data) {
            if (!data.export || !data.import || !data.gdp) { showError('Нет данных'); return; }
            const allYears = [...data.historical.years, ...data.forecast_years];
            const histExport = [...data.historical.export, ...Array(data.forecast_years.length).fill(null)];
            const histImport = [...data.historical.import, ...Array(data.forecast_years.length).fill(null)];
            const histGdp = [...data.historical.gdp, ...Array(data.forecast_years.length).fill(null)];
            const fcExport = [...Array(data.historical.years.length).fill(null), ...(data.export.forecast || [])];
            const fcImport = [...Array(data.historical.years.length).fill(null), ...(data.import.forecast || [])];
            const fcGdp = [...Array(data.historical.years.length).fill(null), ...(data.gdp.forecast || [])];
            
            const html = `<div class="forecast-container"><div class="country-title">📌 ${data.country_name}</div>
                <div class="methods-grid">
                    <div class="method-card export"><h3>📤 ${data.export.name}</h3><div class="formula">${data.export.formula || 'y = a + b·x'}</div>
                    <div class="metrics"><div class="metric"><div class="label">R²</div><div class="value">${data.export.metrics?.r2?.toFixed(4) || 'N/A'}</div></div>
                    <div class="metric"><div class="label">RMSE</div><div class="value">${data.export.metrics?.rmse?.toFixed(2) || 'N/A'}</div></div>
                    <div class="metric"><div class="label">MAE</div><div class="value">${data.export.metrics?.mae?.toFixed(2) || 'N/A'}</div></div>
                    <div class="metric"><div class="label">MAPE</div><div class="value">${data.export.metrics?.mape?.toFixed(1) || 'N/A'}%</div></div></div>
                    <div class="forecast-list">${data.forecast_years.map((y,i)=>`<div class="forecast-item"><strong>${y}</strong>: ${data.export.forecast[i]?.toFixed(2) || 'N/A'}</div>`).join('')}</div></div>
                    <div class="method-card import"><h3>📥 ${data.import.name}</h3><div class="formula">${data.import.formula || 'y = a + b·x'}</div>
                    <div class="metrics"><div class="metric"><div class="label">R²</div><div class="value">${data.import.metrics?.r2?.toFixed(4) || 'N/A'}</div></div>
                    <div class="metric"><div class="label">RMSE</div><div class="value">${data.import.metrics?.rmse?.toFixed(2) || 'N/A'}</div></div>
                    <div class="metric"><div class="label">MAE</div><div class="value">${data.import.metrics?.mae?.toFixed(2) || 'N/A'}</div></div>
                    <div class="metric"><div class="label">MAPE</div><div class="value">${data.import.metrics?.mape?.toFixed(1) || 'N/A'}%</div></div></div>
                    <div class="forecast-list">${data.forecast_years.map((y,i)=>`<div class="forecast-item"><strong>${y}</strong>: ${data.import.forecast[i]?.toFixed(2) || 'N/A'}</div>`).join('')}</div></div>
                    <div class="method-card gdp"><h3>🏭 ${data.gdp.name}</h3><div class="formula">${data.gdp.formula?.substring(0,100) || 'Формула регрессии'}${data.gdp.formula?.length>100?'...':''}</div>
                    <div class="metrics"><div class="metric"><div class="label">R²</div><div class="value">${data.gdp.metrics?.r2?.toFixed(4) || 'N/A'}</div></div>
                    <div class="metric"><div class="label">RMSE</div><div class="value">${data.gdp.metrics?.rmse?.toFixed(2) || 'N/A'}</div></div>
                    <div class="metric"><div class="label">MAE</div><div class="value">${data.gdp.metrics?.mae?.toFixed(2) || 'N/A'}</div></div>
                    <div class="metric"><div class="label">MAPE</div><div class="value">${data.gdp.metrics?.mape?.toFixed(1) || 'N/A'}%</div></div></div>
                    <div class="forecast-list">${data.forecast_years.map((y,i)=>`<div class="forecast-item"><strong>${y}</strong>: ${data.gdp.forecast[i]?.toFixed(2) || 'N/A'}</div>`).join('')}</div></div>
                </div></div>
                <div class="chart-container"><h3>📊 Прогноз экспорта и импорта</h3><canvas id="tradeChart"></canvas><div class="info-message">📈 Сплошные — история, пунктирные — прогноз</div></div>
                <div class="chart-container"><h3>📊 Прогноз ВВП</h3><canvas id="gdpChart"></canvas><div class="info-message">📈 Сплошная — история, пунктирная — прогноз</div></div>`;
            document.getElementById('result').innerHTML = html;
            createTradeChart(allYears, histExport, histImport, fcExport, fcImport);
            createGdpChart(allYears, histGdp, fcGdp);
        }
        
        function createTradeChart(labels, histExp, histImp, fcExp, fcImp) {
            if (tradeChart) tradeChart.destroy();
            tradeChart = new Chart(document.getElementById('tradeChart'), {
                type: 'line',
                data: { labels, datasets: [
                    { label: 'Экспорт (история)', data: histExp, borderColor: '#2ecc71', borderWidth: 2, pointRadius: 4, tension: 0, fill: false },
                    { label: 'Импорт (история)', data: histImp, borderColor: '#f39c12', borderWidth: 2, pointRadius: 4, tension: 0, fill: false },
                    { label: 'Прогноз экспорта', data: fcExp, borderColor: '#2ecc71', borderWidth: 2, borderDash: [5,5], pointRadius: 4, tension: 0, fill: false },
                    { label: 'Прогноз импорта', data: fcImp, borderColor: '#f39c12', borderWidth: 2, borderDash: [5,5], pointRadius: 4, tension: 0, fill: false }
                ] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'top' }, tooltip: { callbacks: { label: (ctx) => ctx.dataset.label + ': ' + ctx.parsed.y?.toFixed(2) + ' млрд USD' } } }, scales: { y: { beginAtZero: true, title: { display: true, text: 'млрд USD' } }, x: { title: { display: true, text: 'Год' } } } }
            });
        }
        
        function createGdpChart(labels, histGdp, fcGdp) {
            if (gdpChart) gdpChart.destroy();
            gdpChart = new Chart(document.getElementById('gdpChart'), {
                type: 'line',
                data: { labels, datasets: [
                    { label: 'ВВП (история)', data: histGdp, borderColor: '#e74c3c', borderWidth: 2, pointRadius: 4, tension: 0, fill: false },
                    { label: 'Прогноз ВВП', data: fcGdp, borderColor: '#e74c3c', borderWidth: 2, borderDash: [5,5], pointRadius: 4, tension: 0, fill: false }
                ] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'top' }, tooltip: { callbacks: { label: (ctx) => ctx.dataset.label + ': ' + ctx.parsed.y?.toFixed(2) + ' млрд USD' } } }, scales: { y: { beginAtZero: true, title: { display: true, text: 'млрд USD' } }, x: { title: { display: true, text: 'Год' } } } }
            });
        }
        
        loadCountries();
    </script>
</body>
</html>

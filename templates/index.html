<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Экономические показатели стран</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .content { padding: 30px; }
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f7f7f7;
            border-radius: 10px;
        }
        select, input, button {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            border: none;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: #f9f9f9;
            border-radius: 10px;
            margin: 20px 0;
        }
        .empty-state h3 {
            color: #666;
            margin-bottom: 15px;
        }
        .empty-state p {
            color: #999;
            margin-bottom: 20px;
        }
        .empty-state button {
            background: #667eea;
            padding: 12px 24px;
            font-size: 16px;
        }
        .csv-import-section {
            margin-top: 40px;
            padding: 25px;
            background: #f5f7fa;
            border-radius: 15px;
        }
        .import-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .info-message {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
        }
        @media (max-width: 768px) {
            .charts { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Экономические показатели стран</h1>
            <p>Визуализация экспорта, импорта и ВВП</p>
        </div>
        
        <div class="content">
            <!-- Фильтры -->
            <div class="controls">
                <select id="countrySelect">
                    <option value="">Все страны</option>
                </select>
                <select id="indicatorType">
                    <option value="all">Все показатели</option>
                    <option value="export">Экспорт</option>
                    <option value="import">Импорт</option>
                    <option value="gdp">ВВП</option>
                </select>
                <input type="number" id="startYear" placeholder="Год от">
                <input type="number" id="endYear" placeholder="Год до">
                <button onclick="loadData()">🔍 Показать данные</button>
            </div>
            
            <!-- Статистика -->
            <div id="statsContainer" class="stats"></div>
            
            <!-- Графики -->
            <div class="charts">
                <div class="chart-container">
                    <h3>📈 Динамика показателей</h3>
                    <canvas id="trendChart"></canvas>
                    <div id="trendEmptyMessage" style="display:none; text-align:center; padding:50px; color:#999;">
                        Нет данных для отображения<br>
                        Загрузите данные через CSV или добавьте вручную
                    </div>
                </div>
                <div class="chart-container">
                    <h3>🥧 Распределение (последний год)</h3>
                    <canvas id="pieChart"></canvas>
                    <div id="pieEmptyMessage" style="display:none; text-align:center; padding:50px; color:#999;">
                        Нет данных для отображения
                    </div>
                </div>
            </div>
            
            <!-- Импорт CSV -->
            <div class="csv-import-section">
                <h3>📁 Импорт данных из CSV</h3>
                <div class="import-controls">
                    <input type="file" id="csvFile" accept=".csv">
                    <button onclick="previewCSV()">👁️ Предпросмотр</button>
                    <button onclick="downloadTemplate()">📄 Скачать шаблон</button>
                </div>
                <div id="previewContainer" style="display:none;"></div>
                <div id="importResult"></div>
            </div>
        </div>
    </div>
    
    <script>
        let trendChart, pieChart;
        
        async function loadCountries() {
            const response = await fetch('/api/countries');
            const countries = await response.json();
            const select = document.getElementById('countrySelect');
            
            // Очищаем и добавляем опцию по умолчанию
            select.innerHTML = '<option value="">Все страны</option>';
            
            countries.forEach(c => {
                const option = document.createElement('option');
                option.value = c.id;
                option.textContent = c.name;
                select.appendChild(option);
            });
            
            // Если нет стран, показываем сообщение
            if (countries.length === 0) {
                const infoDiv = document.createElement('div');
                infoDiv.className = 'info-message';
                infoDiv.innerHTML = 'ℹ️ Нет добавленных стран. Загрузите данные через CSV или добавьте страны вручную.';
                document.querySelector('.controls').after(infoDiv);
            }
        }
        
        async function loadData() {
            const params = new URLSearchParams({
                country_id: document.getElementById('countrySelect').value,
                indicator_type: document.getElementById('indicatorType').value,
                start_year: document.getElementById('startYear').value,
                end_year: document.getElementById('endYear').value
            });
            
            const response = await fetch(`/api/indicators/filter?${params}`);
            const data = await response.json();
            
            // Скрываем/показываем сообщения о пустых данных
            const hasData = data && data.length > 0;
            
            if (!hasData) {
                // Показываем сообщения об отсутствии данных
                document.getElementById('trendEmptyMessage').style.display = 'block';
                document.getElementById('pieEmptyMessage').style.display = 'block';
                if (trendChart) trendChart.destroy();
                if (pieChart) pieChart.destroy();
                document.getElementById('statsContainer').innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <h3>📭 Нет данных для отображения</h3>
                        <p>Загрузите данные через CSV файл или добавьте вручную</p>
                        <button onclick="document.getElementById('csvFile').click()">📁 Загрузить CSV</button>
                    </div>
                `;
                return;
            }
            
            // Скрываем сообщения
            document.getElementById('trendEmptyMessage').style.display = 'none';
            document.getElementById('pieEmptyMessage').style.display = 'none';
            
            // Обновляем графики
            const years = data.map(d => d.year);
            const exports = data.map(d => d.export_value || 0);
            const imports = data.map(d => d.import_value || 0);
            const gdps = data.map(d => d.gdp_value || 0);
            
            if (trendChart) trendChart.destroy();
            trendChart = new Chart(document.getElementById('trendChart'), {
                type: 'line',
                data: {
                    labels: years,
                    datasets: [
                        { label: 'Экспорт (млрд USD)', data: exports, borderColor: 'rgb(75, 192, 192)', tension: 0.1 },
                        { label: 'Импорт (млрд USD)', data: imports, borderColor: 'rgb(255, 99, 132)', tension: 0.1 },
                        { label: 'ВВП (млрд USD)', data: gdps, borderColor: 'rgb(54, 162, 235)', tension: 0.1 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { position: 'top' } }
                }
            });
            
            if (pieChart) pieChart.destroy();
            const last = data[data.length-1];
            pieChart = new Chart(document.getElementById('pieChart'), {
                type: 'pie',
                data: {
                    labels: ['Экспорт', 'Импорт', 'ВВП'],
                    datasets: [{
                        data: [last.export_value||0, last.import_value||0, last.gdp_value||0],
                        backgroundColor: ['rgb(75, 192, 192)', 'rgb(255, 99, 132)', 'rgb(54, 162, 235)']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { position: 'top' },
                        title: { display: true, text: `Показатели за ${last.year} год` }
                    }
                }
            });
            
            // Загружаем статистику если выбрана страна
            const countryId = document.getElementById('countrySelect').value;
            if (countryId) {
                const statsRes = await fetch(`/api/stats/${countryId}`);
                const stats = await statsRes.json();
                if (stats && stats.years_count > 0) {
                    const statsHtml = `
                        <div class="stat-card"><h3>📊 Лет данных</h3><div class="value">${stats.years_count || 0}</div></div>
                        <div class="stat-card"><h3>📅 Период</h3><div class="value">${stats.min_year || '-'} - ${stats.max_year || '-'}</div></div>
                        <div class="stat-card"><h3>💰 Средний экспорт</h3><div class="value">${stats.avg_export ? stats.avg_export.toFixed(2) : '-'} млрд</div></div>
                        <div class="stat-card"><h3>📥 Средний импорт</h3><div class="value">${stats.avg_import ? stats.avg_import.toFixed(2) : '-'} млрд</div></div>
                        <div class="stat-card"><h3>🏭 Средний ВВП</h3><div class="value">${stats.avg_gdp ? stats.avg_gdp.toFixed(2) : '-'} млрд</div></div>
                    `;
                    document.getElementById('statsContainer').innerHTML = statsHtml;
                } else {
                    document.getElementById('statsContainer').innerHTML = `
                        <div class="empty-state" style="grid-column: 1/-1;">
                            <h3>📭 Нет статистики для выбранной страны</h3>
                            <p>Добавьте данные через CSV или форму ниже</p>
                        </div>
                    `;
                }
            } else {
                document.getElementById('statsContainer').innerHTML = `
                    <div class="info-message" style="grid-column: 1/-1; text-align:center;">
                        📊 Выберите страну для просмотра статистики
                    </div>
                `;
            }
        }
        
        async function previewCSV() {
            const file = document.getElementById('csvFile').files[0];
            if (!file) {
                alert('Выберите файл');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            const response = await fetch('/api/csv/preview', { method: 'POST', body: formData });
            const result = await response.json();
            
            const previewDiv = document.getElementById('previewContainer');
            
            if (result.success) {
                previewDiv.style.display = 'block';
                previewDiv.innerHTML = `
                    <div style="background: #e8f5e9; padding: 15px; border-radius: 8px; margin-top: 15px;">
                        <h4>📋 Предпросмотр данных</h4>
                        <p><strong>Найдено колонок:</strong> ${result.columns.length}</p>
                        <p><strong>Определено соответствие:</strong></p>
                        <ul>
                            ${Object.entries(result.detected_mapping).map(([k,v]) => `<li>${k}: ${v || 'не найдено'}</li>`).join('')}
                        </ul>
                        <p><strong>Первые 3 строки:</strong></p>
                        <pre style="background: white; padding: 10px; overflow-x: auto;">${JSON.stringify(result.preview, null, 2)}</pre>
                        <button onclick="importCSV()" style="margin-top: 10px;">🚀 Начать импорт</button>
                        <button onclick="document.getElementById('previewContainer').style.display='none'" style="margin-top: 10px; margin-left: 10px;">❌ Отмена</button>
                    </div>
                `;
            } else {
                previewDiv.style.display = 'block';
                previewDiv.innerHTML = `
                    <div style="background: #ffebee; padding: 15px; border-radius: 8px; margin-top: 15px; color: #c62828;">
                        <strong>❌ Ошибка:</strong> ${result.error}
                    </div>
                `;
            }
        }
        
        async function importCSV() {
            const file = document.getElementById('csvFile').files[0];
            const formData = new FormData();
            formData.append('file', file);
            
            const response = await fetch('/api/csv/import', { method: 'POST', body: formData });
            const result = await response.json();
            
            const resultDiv = document.getElementById('importResult');
            if (result.success) {
                resultDiv.innerHTML = `
                    <div style="background: #d4edda; padding: 15px; border-radius: 8px; margin-top: 15px; color: #155724;">
                        <strong>✅ Импорт завершен!</strong><br>
                        📊 Всего строк: ${result.total_rows}<br>
                        💾 Импортировано: ${result.imported_rows}<br>
                        ⏭️ Пропущено: ${result.skipped_rows || 0}
                        ${result.errors && result.errors.length ? `<br>⚠️ Ошибок: ${result.errors.length}` : ''}
                    </div>
                `;
                // Перезагружаем данные
                setTimeout(() => {
                    loadCountries();
                    loadData();
                    document.getElementById('previewContainer').style.display = 'none';
                }, 2000);
            } else {
                resultDiv.innerHTML = `
                    <div style="background: #f8d7da; padding: 15px; border-radius: 8px; margin-top: 15px; color: #721c24;">
                        <strong>❌ Ошибка импорта:</strong><br>
                        ${result.errors.join('<br>')}
                    </div>
                `;
            }
        }
        
        async function downloadTemplate() {
            window.location.href = '/api/csv/template';
        }
        
        // Инициализация
        loadCountries();
        loadData();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Экономические показатели стран</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Экономические показатели стран</h1>
            <p>Визуализация, прогнозирование и регрессионный анализ</p>
        </div>
        
        <div class="content">
            <!-- Фильтры -->
            <div class="controls">
                <div class="control-group">
                    <label>🌍 Выберите страну</label>
                    <select id="countrySelect">
                        <option value="">Все страны</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>📈 Тип показателя</label>
                    <select id="indicatorType">
                        <option value="all">Все показатели</option>
                        <option value="export">Экспорт</option>
                        <option value="import">Импорт</option>
                        <option value="gdp">ВВП</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>📅 Год от</label>
                    <input type="number" id="startYear" placeholder="Начальный год">
                </div>
                <div class="control-group">
                    <label>📅 Год до</label>
                    <input type="number" id="endYear" placeholder="Конечный год">
                </div>
                <div class="control-group">
                    <label>&nbsp;</label>
                    <button onclick="loadData()">🔍 Показать данные</button>
                </div>
            </div>
            
            <div id="statsContainer" class="stats"></div>
            
            <!-- График динамики -->
            <div class="chart-container">
                <h3>📈 Динамика экономических показателей</h3>
                <canvas id="trendChart"></canvas>
                <div id="trendEmptyMessage" style="display:none; text-align:center; padding:50px; color:#999;">
                    <h3>Нет данных для отображения</h3>
                    <p>Загрузите данные через CSV</p>
                </div>
            </div>
            
            <!-- Авторегрессионный прогноз -->
            <div class="auto-regression-section" id="autoRegressionSection" style="display:none;">
                <h3>📈 Авторегрессионный прогноз временных рядов</h3>
                <div class="auto-regression-controls">
                    <div class="control-group">
                        <label>📊 Показатель</label>
                        <select id="arIndicator">
                            <option value="export">Экспорт</option>
                            <option value="import">Импорт</option>
                            <option value="gdp">ВВП</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>🤖 Модель</label>
                        <select id="arModel">
                            <option value="linear">📈 Линейная</option>
                            <option value="polynomial">📊 Полиномиальная</option>
                            <option value="exponential">📉 Экспоненциальная</option>
                            <option value="ridge">🎯 Ridge</option>
                            <option value="lasso">⚡ Lasso</option>
                            <option value="compare">🔍 Сравнить все</option>
                        </select>
                    </div>
                    <div class="control-group" id="arDegreeGroup" style="display:none;">
                        <label>🔢 Степень полинома</label>
                        <select id="arDegree">
                            <option value="2">2</option>
                            <option value="3">3</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>🔮 Горизонт</label>
                        <select id="arSteps">
                            <option value="3">3 года</option>
                            <option value="5" selected>5 лет</option>
                            <option value="7">7 лет</option>
                            <option value="10">10 лет</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>📊 Доверительные интервалы</label>
                        <select id="arConfidence">
                            <option value="false">Нет</option>
                            <option value="true">Да (95%)</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>&nbsp;</label>
                        <button onclick="loadAutoRegression()" class="btn-primary">🔮 Построить прогноз</button>
                    </div>
                </div>
                
                <div id="arResult" style="display:none;">
                    <div id="arMetrics" class="forecast-metrics"></div>
                    <div class="forecast-chart-container">
                        <canvas id="arChart"></canvas>
                    </div>
                    <div id="arFormula" class="formula-container"></div>
                    <div id="arTable" class="forecast-table"></div>
                </div>
            </div>
            
            <!-- Импорт CSV -->
            <div class="csv-import-section">
                <h3>📁 Импорт данных из CSV/Excel</h3>
                <div class="import-controls">
                    <input type="file" id="csvFile" accept=".csv,.xlsx" class="file-input">
                    <button onclick="previewCSV()" class="btn-secondary">👁️ Предпросмотр</button>
                    <button onclick="downloadTemplate()" class="btn-secondary">📄 Скачать шаблон</button>
                </div>
                <div id="previewContainer" style="display:none;"></div>
                <div id="importResult"></div>
            </div>
            
            <!-- Управление данными -->
            <div class="data-management-section">
                <h3>🗑️ Управление данными</h3>
                <div class="management-controls">
                    <div class="control-group">
                        <label>📊 Удалить показатель</label>
                        <select id="deleteIndicatorSelect">
                            <option value="">Выберите показатель</option>
                        </select>
                        <button onclick="deleteIndicator()" class="btn-danger">🗑️ Удалить показатель</button>
                    </div>
                    <div class="control-group">
                        <label>🏢 Удалить все показатели страны</label>
                        <select id="deleteCountryIndicatorsSelect">
                            <option value="">Выберите страну</option>
                        </select>
                        <button onclick="deleteAllIndicators()" class="btn-warning">⚠️ Удалить показатели</button>
                    </div>
                    <div class="control-group">
                        <label>🗑️ Удалить страну</label>
                        <select id="deleteCountrySelect">
                            <option value="">Выберите страну</option>
                        </select>
                        <button onclick="deleteCountry()" class="btn-danger">🔥 Удалить страну</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
